name: Daily News Pipeline

on:
  schedule:
    # Runs at 00:30 UTC every day (6:00 AM IST)
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the database back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: .
        run: python src/scheduler/jobs.py

      - name: Commit and push database changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dailygk.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update database with new facts" && git pull --rebase origin main && git push)
